; Raises PHP upload limits on shared/cPanel hosting (PHP-FPM reads .user.ini).
; The app allows image uploads up to 8 MB, so these must sit comfortably above
; that. If your host ignores .user.ini, set the same values in cPanel:
;   "Select PHP Version" → Options, or "MultiPHP INI Editor".
upload_max_filesize = 12M
post_max_size = 16M
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
